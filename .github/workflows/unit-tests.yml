# BHoM_Engine/.github/workflows/unit-tests.yml
name: Unit Tests

on:
  push:
    branches: [main, develop]
    paths:
      - "**/*.cs"
      - "**/*.csproj"
      - "**/*.sln*"
      - ".ci/tests/**"
      - "dependencies.txt"
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  ci:
    uses: BuroHappoldEngineeringSandbox/DevOps_Toolkit/.github/workflows/unit-tests.yml@main
    with:
      test_solution: ".ci/tests/UnitTests/UnitTests.slnx"
      # Optional knobs (defaults shown in unit-tests.yml):
      # dotnet_version: "10.x"
      # configuration: "Release"
      # test_max_cpu: 4
      # coverage_on_push: false
    secrets: inherit